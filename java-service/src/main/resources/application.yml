spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qerp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
risk:
  max-order-quantity: 1000
  max-instrument-quantity: 2000
execution:
  default-fill-price: 1.000000
market-data:
  enabled: false
  base-url: https://finnhub.io/api/v1
  api-key: ${FINNHUB_API_KEY:}
  poll-ms: 60000
  max-instruments-per-run: 100
server:
  port: ${SERVER_PORT:8080}
