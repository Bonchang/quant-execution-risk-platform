spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:qerp}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
risk:
  max-order-quantity: 1000
  max-instrument-quantity: 2000
execution:
  default-fill-price: 1.000000
market-data:
  enabled: false
  base-url: https://finnhub.io/api/v1
  api-key: ${FINNHUB_API_KEY:}
  poll-ms: 5000
  stale-threshold-seconds: 20
  max-instruments-per-run: 100
  source-mode: FINNHUB_REST
  bid-ask-fallback-rule: MID_SPREAD
  synthetic-spread-bps: 10.0
  execution-slippage-bps: 2.0
outbox:
  poll-ms: 5000
orders:
  expiry-poll-ms: 60000
research:
  artifacts-path: ${RESEARCH_ARTIFACTS_PATH:../python-research/artifacts}
security:
  jwt:
    secret: ${JWT_SECRET:qerp-demo-secret-key-qerp-demo-secret-key}
    ttl-seconds: 3600
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
server:
  port: ${SERVER_PORT:8080}
