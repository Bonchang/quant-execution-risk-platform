<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QERP Mission Control</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="atmosphere"></div>
<main class="shell">
  <header class="hero">
    <div>
      <p class="eyebrow">Quant Execution Risk Platform</p>
      <h1>Mission Control Dashboard</h1>
      <p class="sub">주문 생성, 리스크 판정, 체결, 포지션 업데이트를 한 화면에서 확인합니다.</p>
    </div>
    <div class="toolbar">
      <button id="seed-btn" type="button">데모 데이터 생성</button>
      <button id="ingest-btn" type="button">시세 수집 실행</button>
      <button id="snapshot-btn" type="button">포트폴리오 스냅샷 갱신</button>
      <button id="refresh-btn" type="button">새로고침</button>
      <label class="switch">
        <input id="auto-refresh" type="checkbox" checked>
        <span>5초 자동새로고침</span>
      </label>
    </div>
  </header>

  <section class="grid kpis" id="summary-cards"></section>
  <section class="grid kpis portfolio-kpis" id="portfolio-kpis"></section>

  <section class="panel">
    <h2>외부 시세 연동 상태</h2>
    <div id="marketdata-status" class="marketdata-status"></div>
    <pre id="marketdata-result" class="result">아직 시세 수집 요청 없음</pre>
  </section>

  <section class="panel">
    <h2>신규 주문</h2>
    <form id="order-form" class="order-grid">
      <label>Strategy Run
        <select id="strategy-run-select" name="strategyRunId" required></select>
      </label>
      <label>Instrument
        <select id="instrument-select" name="instrumentId" required></select>
      </label>
      <label>Side
        <select name="side" required>
          <option value="BUY">BUY</option>
          <option value="SELL">SELL</option>
        </select>
      </label>
      <label>Quantity
        <input name="quantity" type="number" min="0.000001" step="0.000001" value="10" required>
      </label>
      <label>Order Type
        <select name="orderType" required>
          <option value="MARKET">MARKET</option>
          <option value="LIMIT">LIMIT</option>
        </select>
      </label>
      <label>Limit Price (LIMIT only)
        <input name="limitPrice" type="number" min="0.000001" step="0.000001" placeholder="예: 100.500000">
      </label>
      <label>Client Order ID
        <input name="clientOrderId" type="text" maxlength="64" required>
      </label>
      <button class="submit" type="submit">주문 전송</button>
    </form>
    <pre id="order-result" class="result">주문 결과가 여기에 표시됩니다.</pre>
  </section>

  <section class="grid">
    <article class="panel">
      <h2>주문 상태 분포</h2>
      <div id="status-cards" class="status-cards"></div>
    </article>
    <article class="panel">
      <h2>실시간 메모</h2>
      <ul id="event-feed" class="event-feed"></ul>
    </article>
  </section>

  <section class="panel">
    <h2>최근 주문</h2>
    <div class="table-wrap"><table id="orders-table"></table></div>
  </section>

  <section class="panel">
    <h2>리스크 체크 결과</h2>
    <div class="table-wrap"><table id="risk-table"></table></div>
  </section>

  <section class="grid">
    <article class="panel">
      <h2>최근 체결</h2>
      <div class="table-wrap"><table id="fills-table"></table></div>
    </article>
    <article class="panel">
      <h2>현재 포지션</h2>
      <div class="table-wrap"><table id="positions-table"></table></div>
    </article>
  </section>

  <section class="panel">
    <h2>포트폴리오 성과 스냅샷</h2>
    <div class="table-wrap"><table id="portfolio-table"></table></div>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
