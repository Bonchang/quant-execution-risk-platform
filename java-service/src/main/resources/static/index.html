<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>QERP Progress Dashboard</title>
  <link rel="stylesheet" href="/app.css">
</head>
<body>
<div class="bg-grid"></div>
<main class="container">
  <header class="hero">
    <h1>QERP Live Progress</h1>
    <p>주문, 리스크, 체결, 포지션 상태를 실시간으로 확인합니다.</p>
    <div class="actions">
      <button id="refresh-btn" type="button">새로고침</button>
      <label class="toggle"><input id="auto-refresh" type="checkbox" checked> 5초 자동 새로고침</label>
    </div>
  </header>

  <section class="panel">
    <h2>빠른 주문 생성</h2>
    <form id="order-form" class="form-grid">
      <label>StrategyRun ID<input name="strategyRunId" type="number" required min="1"></label>
      <label>Instrument ID<input name="instrumentId" type="number" required min="1"></label>
      <label>Side
        <select name="side" required>
          <option value="BUY">BUY</option>
          <option value="SELL">SELL</option>
        </select>
      </label>
      <label>Quantity<input name="quantity" type="number" required min="0.000001" step="0.000001"></label>
      <label>Order Type
        <select name="orderType" required>
          <option value="MARKET">MARKET</option>
          <option value="LIMIT">LIMIT</option>
        </select>
      </label>
      <label>Client Order ID<input name="clientOrderId" type="text" required maxlength="64"></label>
      <button class="submit" type="submit">주문 전송</button>
    </form>
    <pre id="order-result" class="result">아직 주문 요청 없음</pre>
  </section>

  <section class="panel">
    <h2>주문 상태 집계</h2>
    <div id="status-cards" class="cards"></div>
  </section>

  <section class="panel">
    <h2>최근 주문</h2>
    <div class="table-wrap"><table id="orders-table"></table></div>
  </section>

  <section class="panel">
    <h2>최근 리스크 체크</h2>
    <div class="table-wrap"><table id="risk-table"></table></div>
  </section>

  <section class="panel">
    <h2>최근 체결</h2>
    <div class="table-wrap"><table id="fills-table"></table></div>
  </section>

  <section class="panel">
    <h2>현재 포지션</h2>
    <div class="table-wrap"><table id="positions-table"></table></div>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
