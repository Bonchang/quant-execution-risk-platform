name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Frontend lint
        working-directory: frontend
        run: npm run lint
      - name: Frontend test
        working-directory: frontend
        run: npm run test
      - name: Frontend build
        working-directory: frontend
        run: npm run build

  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Run Java tests
        working-directory: java-service
        run: ./gradlew test

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: python-research
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run Python tests
        working-directory: python-research
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Frontend build
        working-directory: frontend
        run: |
          npm ci
          npm run build
      - name: Java bootJar smoke check
        working-directory: java-service
        run: ./gradlew bootJar
      - name: Python package smoke check
        working-directory: python-research
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m qerp_research.run_backtest --help
      - name: Compose app smoke check
        run: |
          docker compose -f compose.yml up --build -d
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/actuator/health > /tmp/health.json; then
              break
            fi
            sleep 2
          done
          curl -fsS http://localhost:8080/
          curl -fsS http://localhost:8080/discover
          curl -fsS http://localhost:8080/stocks/DEMO_AAPL || curl -fsS http://localhost:8080/stocks/AAPL
          curl -fsS http://localhost:8080/app/home
          TOKEN=$(curl -fsS -X POST http://localhost:8080/auth/token -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123!"}' | python -c 'import json,sys; print(json.load(sys.stdin)["accessToken"])')
          curl -fsS -X POST http://localhost:8080/dashboard/seed-demo -H "Authorization: Bearer $TOKEN"
          VIEWER_TOKEN=$(curl -fsS -X POST http://localhost:8080/auth/token -H "Content-Type: application/json" -d '{"username":"viewer","password":"viewer123!"}' | python -c 'import json,sys; print(json.load(sys.stdin)["accessToken"])')
          curl -fsS http://localhost:8080/app/home
          curl -fsS http://localhost:8080/app/stocks/DEMO_AAPL
          curl -fsS http://localhost:8080/app/portfolio -H "Authorization: Bearer $VIEWER_TOKEN"
          curl -fsS http://localhost:8080/app/orders -H "Authorization: Bearer $VIEWER_TOKEN"
          curl -fsS http://localhost:8080/market-data/quotes -H "Authorization: Bearer $VIEWER_TOKEN"
      - name: Compose shutdown
        if: always()
        run: docker compose -f compose.yml down -v
