name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  java-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Run Java tests
        working-directory: java-service
        run: ./gradlew test

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python dependencies
        working-directory: python-research
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Run Python tests
        working-directory: python-research
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

  build-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Java bootJar smoke check
        working-directory: java-service
        run: ./gradlew bootJar
      - name: Python package smoke check
        working-directory: python-research
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m qerp_research.run_backtest --help
