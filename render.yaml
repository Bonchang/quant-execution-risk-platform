services:
  - type: web
    name: qerp-web
    runtime: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./java-service/Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: RESEARCH_ARTIFACTS_PATH
        value: /tmp/artifacts
      - key: MARKET_DATA_ENABLED
        value: "false"
