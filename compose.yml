services:
  postgres:
    image: postgres:16
    container_name: qerp-postgres
    environment:
      POSTGRES_DB: qerp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qerp"]
      interval: 10s
      timeout: 5s
      retries: 5

  java-service:
    build:
      context: .
      dockerfile: java-service/Dockerfile
    container_name: qerp-java-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: qerp
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"

  prometheus:
    image: prom/prometheus:v3.3.1
    container_name: qerp-prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - java-service
    ports:
      - "9090:9090"

volumes:
  postgres-data:
